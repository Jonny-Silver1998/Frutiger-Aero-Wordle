<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frutiger Wordle</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Varela+Round&display=swap');

        body {
            margin: 0;
            padding: 0;
            font-family: 'Varela Round', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #333;
            overflow: hidden;
            background: #8fd3ff;
        }

        .bg-layer {
            position: fixed;
            inset: 0;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: opacity 0.9s ease-in-out;
            z-index: -2;
        }

        .bg-layer.fade-out { opacity: 0; }
        .bg-layer.fade-in { opacity: 1; }

        .ui-root {
            position: relative;
            z-index: 2;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 150, 255, 0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
            max-width: 95vw;
            transition: background 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
        }

        .container.menu-mode {
            background: transparent;
            border-color: transparent;
            box-shadow: none;
            backdrop-filter: none;
        }

        h1 {
            color: #fff;
            text-shadow: 0 0 10px rgba(0,150,255,0.8), 2px 2px 4px rgba(0,0,0,0.3);
            margin-top: 20px;
            font-size: 3rem;
            text-align: center;
        }

        .menu {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 50px;
        }

        .bubble-btn {
            width: 160px;
            height: 160px;
            background-image: url('https://imgpng.ru/d/soap_bubbles_PNG9.png');
            background-size: 110%;
            background-position: center;
            background-color: transparent;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-family: 'Varela Round', sans-serif;
            font-size: 1.2rem;
            font-weight: bold;
            color: #005a8d;
            text-shadow: 1px 1px 5px rgba(255,255,255,0.9);
            transition: transform 0.3s ease, filter 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .bubble-btn:hover {
            transform: translateY(-15px) scale(1.05);
            filter: drop-shadow(0 15px 10px rgba(0,0,0,0.2));
        }

        #game-board {
            display: none;
            grid-template-rows: repeat(6, 1fr);
            gap: 5px;
            margin-bottom: 20px;
        }

        .row {
            display: grid;
            grid-template-columns: repeat(var(--word-length, 5), 1fr);
            gap: 5px;
        }

        .cell {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.6);
            border: 2px solid #b3e0ff;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            text-transform: uppercase;
            box-shadow: inset 0 0 10px rgba(255,255,255,0.5);
        }

        .correct { background: #8cd98c !important; color: white; border-color: #66cc66; text-shadow: 1px 1px 2px rgba(0,0,0,0.2); }
        .present { background: #ffe680 !important; color: white; border-color: #ffcc00; text-shadow: 1px 1px 2px rgba(0,0,0,0.2); }
        .absent { background: #b3b3b3 !important; color: white; border-color: #999; text-shadow: 1px 1px 2px rgba(0,0,0,0.2); }

        #keyboard {
            display: none;
            flex-direction: column;
            gap: 5px;
            align-items: center;
        }

        .key-row { display: flex; gap: 5px; }

        .key {
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid #fff;
            border-radius: 8px;
            padding: 12px;
            cursor: pointer;
            font-weight: bold;
            font-family: inherit;
            color: #333;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: all 0.2s;
            text-transform: uppercase;
        }

        .key:active { transform: scale(0.95); }
        .key.large { padding: 12px 15px; font-size: 0.9rem; }

        #friend-menu {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        input[type="text"] {
            padding: 10px 15px;
            border-radius: 20px;
            border: 2px solid #66ccff;
            font-size: 1.2rem;
            outline: none;
            background: rgba(255,255,255,0.8);
            text-align: center;
            font-family: 'Varela Round', sans-serif;
            text-transform: uppercase;
        }

        .action-btn {
            padding: 10px 20px;
            border-radius: 20px;
            border: none;
            background: linear-gradient(135deg, #66ccff, #0099ff);
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 150, 255, 0.4);
            font-family: inherit;
        }

        .action-btn:hover { background: linear-gradient(135deg, #33bbff, #0077cc); }

        #link-output {
            font-size: 0.9rem;
            background: rgba(255,255,255,0.7);
            padding: 10px;
            border-radius: 10px;
            word-break: break-all;
            max-width: 300px;
            text-align: center;
            display: none;
        }

        #message {
            margin-top: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #005a8d;
            min-height: 25px;
            text-shadow: 0 0 5px white;
        }

        .back-btn {
            margin-top: 20px;
            display: none;
            background: rgba(255, 255, 255, 0.5);
            color: #333;
            border: 1px solid #ccc;
            padding: 5px 15px;
            border-radius: 15px;
            cursor: pointer;
            font-family: inherit;
        }

        .toast {
            position: fixed;
            top: 20px;
            background: rgba(255,255,255,0.9);
            padding: 10px 20px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .wallpaper-modal {
            position: fixed;
            right: 20px;
            bottom: 20px;
            width: min(520px, 92vw);
            max-height: 70vh;
            background: linear-gradient(145deg, rgba(215, 245, 255, 0.8), rgba(178, 226, 255, 0.7));
            border: 1px solid rgba(255, 255, 255, 0.95);
            box-shadow: 0 18px 50px rgba(0, 116, 199, 0.35), inset 0 0 20px rgba(255, 255, 255, 0.65);
            border-radius: 24px;
            padding: 16px;
            backdrop-filter: blur(12px);
            display: none;
            overflow: auto;
            z-index: 3;
        }

        .wallpaper-modal.open { display: block; }

        .wallpaper-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            color: #006194;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.8);
        }

        .wallpaper-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 12px;
        }

        .wallpaper-item {
            border: 2px solid rgba(255, 255, 255, 0.85);
            border-radius: 14px;
            overflow: hidden;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.45);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            padding: 6px;
        }

        .wallpaper-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 117, 201, 0.35);
        }

        .wallpaper-item.selected {
            border-color: #3daeff;
            box-shadow: 0 0 0 2px rgba(61, 174, 255, 0.35);
        }

        .wallpaper-item img {
            width: 100%;
            aspect-ratio: 16 / 10;
            object-fit: cover;
            display: block;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div id="bg-layer-a" class="bg-layer fade-in"></div>
    <div id="bg-layer-b" class="bg-layer fade-out"></div>

    <div class="ui-root">
        <audio id="bg-music"></audio>
        <audio id="sound-bubble">
            <source src="https://www.soundjay.com/misc/sounds/bubble-pop-01.mp3" type="audio/mpeg">
        </audio>
        <audio id="sound-end">
            <source src="https://www.soundjay.com/misc/sounds/chime-up-01.mp3" type="audio/mpeg">
        </audio>

        <h1>Frutiger Wordle</h1>

        <div class="container menu-mode" id="main-container">
            <div id="main-menu" class="menu">
                <button class="bubble-btn" onclick="startSinglePlayer()">Одиночная<br>игра</button>
                <button class="bubble-btn" onclick="openFriendMenu()">Слово<br>от друга</button>
                <button class="bubble-btn" onclick="toggleWallpaperPicker()">Сменить<br>Фон</button>
                <button class="bubble-btn" onclick="nextMusicTrack()">Смена<br>Музыки</button>
            </div>

            <div id="friend-menu">
                <h2>Загадать слово</h2>
                <input type="text" id="friend-word" maxlength="15" placeholder="3–15 букв">
                <button class="action-btn" onclick="generateLink()">Создать ссылку</button>
                <div id="link-output"></div>
                <button class="action-btn" onclick="copyLink()" id="copy-btn" style="display:none;">Копировать</button>
            </div>

            <div id="game-board"></div>
            <div id="keyboard"></div>
            <div id="message"></div>

            <button class="back-btn" id="back-btn" onclick="goToMenu()">В главное меню</button>
        </div>

        <div id="toast" class="toast">Скопировано!</div>

        <div id="wallpaper-modal" class="wallpaper-modal">
            <div class="wallpaper-header">
                <strong>Выбор Aero/Vista фона</strong>
                <button class="action-btn" onclick="toggleWallpaperPicker()" style="padding: 6px 14px; font-size: 0.95rem;">Закрыть</button>
            </div>
            <div id="wallpaper-grid" class="wallpaper-grid"></div>
        </div>
    </div>

    <script src="words.js"></script>
    <script src="music.js"></script>
    <script>
        function playBubble() {
            const sound = document.getElementById("sound-bubble");
            sound.currentTime = 0;
            sound.play().catch(()=>{});
        }

        function playEndSound() {
            const sound = document.getElementById("sound-end");
            sound.currentTime = 0;
            sound.play().catch(()=>{});
        }

        const bgMusic = document.getElementById("bg-music");
        let currentTrackIndex = 0;
        bgMusic.volume = 0.5;

        function loadTrack(index) {
            if (!Array.isArray(musicPlaylist) || musicPlaylist.length === 0) return;
            currentTrackIndex = (index + musicPlaylist.length) % musicPlaylist.length;
            bgMusic.src = musicPlaylist[currentTrackIndex];
        }

        function nextMusicTrack(forcePlay = true) {
            loadTrack(currentTrackIndex + 1);
            if (forcePlay) bgMusic.play().catch(()=>{});
            playBubble();
        }

        bgMusic.addEventListener('ended', () => nextMusicTrack(true));

        document.body.addEventListener('click', () => {
            if (!bgMusic.src) loadTrack(0);
            if (bgMusic.paused) bgMusic.play().catch(()=>{});
        }, { once: true });

const backgrounds = [
            // Оригинальные фоны
            "https://frutigeraeroarchive.org/images/wallpapers/asadal_stock/asadal_stock_137.jpg",
            "https://frutigeraeroarchive.org/images/wallpapers/asadal_stock/asadal_stock_142.jpg",
            "https://frutigeraeroarchive.org/images/wallpapers/asadal_stock/asadal_stock_134.jpg",
            "https://frutigeraeroarchive.org/images/wallpapers/asadal_stock/asadal_stock_125.jpg",
            "https://frutigeraeroarchive.org/images/wallpapers/asadal_stock/asadal_stock_122.jpg",
            "https://frutigeraeroarchive.org/images/wallpapers/asadal_stock/asadal_stock_114.jpg",
            "https://frutigeraeroarchive.org/images/wallpapers/asadal_stock/asadal_stock_109.jpg",
            "https://frutigeraeroarchive.org/images/wallpapers/asadal_stock/asadal_stock_100.jpg",
            // Новые фоны
            "https://frutigeraeroarchive.org/images/wallpapers/asadal_stock/asadal_stock_22.jpg",
            "https://frutigeraeroarchive.org/images/wallpapers/asadal_stock/asadal_stock_21.jpg",
            "https://frutigeraeroarchive.org/images/wallpapers/asadal_stock/asadal_stock_47.jpg",
            "https://frutigeraeroarchive.org/images/wallpapers/asadal_stock/asadal_stock_68.jpg",
            "https://frutigeraeroarchive.org/images/wallpapers/asadal_stock/asadal_stock_67.jpg"
        ];

        let currentBgIndex = 0;
        let activeLayer = "a";
        const layerA = document.getElementById("bg-layer-a");
        const layerB = document.getElementById("bg-layer-b");

        function setBackgroundWithFade(index) {
            currentBgIndex = (index + backgrounds.length) % backgrounds.length;
            const nextUrl = `url('${backgrounds[currentBgIndex]}')`;

            const visibleLayer = activeLayer === "a" ? layerA : layerB;
            const hiddenLayer = activeLayer === "a" ? layerB : layerA;

            hiddenLayer.style.backgroundImage = nextUrl;
            hiddenLayer.classList.remove("fade-out");
            hiddenLayer.classList.add("fade-in");

            visibleLayer.classList.remove("fade-in");
            visibleLayer.classList.add("fade-out");

            activeLayer = activeLayer === "a" ? "b" : "a";
            refreshWallpaperSelection();
        }

        function changeBackground() {
            setBackgroundWithFade(currentBgIndex + 1);
        }

        function toggleWallpaperPicker() {
            playBubble();
            document.getElementById("wallpaper-modal").classList.toggle("open");
        }

        function renderWallpaperPicker() {
            const grid = document.getElementById("wallpaper-grid");
            grid.innerHTML = "";
            backgrounds.forEach((url, index) => {
                const btn = document.createElement("button");
                btn.className = "wallpaper-item";
                btn.type = "button";
                btn.dataset.index = String(index);
                btn.innerHTML = `<img src="${url}" alt="Фон ${index + 1}">`;
                btn.onclick = () => {
                    setBackgroundWithFade(index);
                    playBubble();
                };
                grid.appendChild(btn);
            });
            refreshWallpaperSelection();
        }

        function refreshWallpaperSelection() {
            document.querySelectorAll(".wallpaper-item").forEach((item) => {
                item.classList.toggle("selected", Number(item.dataset.index) === currentBgIndex);
            });
        }

        let targetWord = "";
        let wordLength = 0;
        let currentRow = 0;
        let currentCol = 0;
        let gameOver = false;
        let isAnimating = false;
        const maxGuesses = 6;

        function hideAll() {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('friend-menu').style.display = 'none';
            document.getElementById('game-board').style.display = 'none';
            document.getElementById('keyboard').style.display = 'none';
            document.getElementById('back-btn').style.display = 'none';
            document.getElementById('message').innerText = "";
            document.getElementById('wallpaper-modal').classList.remove('open');
        }

        function goToMenu() {
            hideAll();
            document.getElementById('main-menu').style.display = 'flex';
            document.getElementById('main-container').classList.add('menu-mode');
            window.history.replaceState({}, document.title, window.location.pathname);
        }

        function openFriendMenu() {
            hideAll();
            document.getElementById('friend-menu').style.display = 'flex';
            document.getElementById('back-btn').style.display = 'block';
            document.getElementById('link-output').style.display = 'none';
            document.getElementById('copy-btn').style.display = 'none';
            document.getElementById('friend-word').value = '';
            document.getElementById('main-container').classList.remove('menu-mode');
        }

        function generateLink() {
            let word = document.getElementById('friend-word').value.toLowerCase().trim();
            if (/\s/.test(word) || !/^[а-яё]+$/.test(word)) {
                showMessage("Только русские буквы, без пробелов!");
                return;
            }
            if (word.length < 3 || word.length > 15) {
                showMessage("Слово должно быть от 3 до 15 букв!");
                return;
            }

            const encodedWord = btoa(encodeURIComponent(word));
            const link = window.location.origin + window.location.pathname + "?word=" + encodedWord;

            const output = document.getElementById('link-output');
            output.innerText = link;
            output.style.display = 'block';
            document.getElementById('copy-btn').style.display = 'inline-block';
            showMessage("");
        }

        function copyLink() {
            const linkText = document.getElementById('link-output').innerText;
            navigator.clipboard.writeText(linkText).then(() => {
                const toast = document.getElementById('toast');
                toast.style.opacity = 1;
                setTimeout(() => toast.style.opacity = 0, 2000);
            });
        }

        window.onload = () => {
            if (typeof dictionary === 'undefined' || !Array.isArray(dictionary)) {
                showMessage("Ошибка: файл words.js не загружен.");
            }

            if (typeof musicPlaylist === 'undefined' || !Array.isArray(musicPlaylist)) {
                showMessage("Ошибка: файл music.js не загружен.");
            } else {
                loadTrack(0);
            }

            setBackgroundWithFade(0);
            renderWallpaperPicker();

            const params = new URLSearchParams(window.location.search);
            const encodedWord = params.get('word');
            if (encodedWord) {
                try {
                    const decodedWord = decodeURIComponent(atob(encodedWord));
                    if (decodedWord.length >= 3 && decodedWord.length <= 15) {
                        startCustomGame(decodedWord);
                    }
                } catch (e) {
                    console.error("Неверный формат слова в ссылке");
                }
            }
        };

        function startSinglePlayer() {
            if (typeof dictionary === 'undefined' || dictionary.length === 0) {
                showMessage("Ошибка: словарь не загружен!");
                return;
            }
            targetWord = dictionary[Math.floor(Math.random() * dictionary.length)].toLowerCase();
            initGame();
        }

        function startCustomGame(word) {
            targetWord = word.toLowerCase();
            initGame();
        }

        function initGame() {
            wordLength = targetWord.length;
            hideAll();

            const board = document.getElementById('game-board');
            board.style.display = 'grid';
            board.style.setProperty('--word-length', wordLength);

            document.getElementById('keyboard').style.display = 'flex';
            document.getElementById('back-btn').style.display = 'block';
            document.getElementById('main-container').classList.remove('menu-mode');

            currentRow = 0;
            currentCol = 0;
            gameOver = false;
            isAnimating = false;

            buildBoard();
            buildKeyboard();

            document.removeEventListener("keydown", handlePhysicalKeyboard);
            document.addEventListener("keydown", handlePhysicalKeyboard);
        }

        function buildBoard() {
            const board = document.getElementById("game-board");
            board.innerHTML = "";
            for (let r = 0; r < maxGuesses; r++) {
                const row = document.createElement("div");
                row.className = "row";
                row.id = `row-${r}`;
                for (let c = 0; c < wordLength; c++) {
                    const cell = document.createElement("div");
                    cell.className = "cell";
                    cell.id = `cell-${r}-${c}`;
                    row.appendChild(cell);
                }
                board.appendChild(row);
            }
        }

        function buildKeyboard() {
            const keyboard = document.getElementById("keyboard");
            keyboard.innerHTML = "";
            const layout = [
                ["й", "ц", "у", "к", "е", "н", "г", "ш", "щ", "з", "х", "ъ"],
                ["ф", "ы", "в", "а", "п", "р", "о", "л", "д", "ж", "э"],
                ["ENTER", "я", "ч", "с", "м", "и", "т", "ь", "б", "ю", "⌫"]
            ];

            layout.forEach(rowKeys => {
                const rowEl = document.createElement("div");
                rowEl.className = "key-row";
                rowKeys.forEach(key => {
                    const keyEl = document.createElement("button");
                    keyEl.className = "key";
                    keyEl.textContent = key;
                    keyEl.id = `key-${key}`;
                    if (key === "ENTER" || key === "⌫") keyEl.classList.add("large");

                    keyEl.onclick = () => handleInput(key);
                    rowEl.appendChild(keyEl);
                });
                keyboard.appendChild(rowEl);
            });
        }

        function handlePhysicalKeyboard(e) {
            if (gameOver || isAnimating) return;
            const key = e.key.toLowerCase();
            if (key === "enter") handleInput("ENTER");
            else if (key === "backspace") handleInput("⌫");
            else if (/^[а-яё]$/.test(key)) handleInput(key);
        }

        function handleInput(key) {
            if (gameOver || isAnimating) return;

            if (key === "⌫") {
                if (currentCol > 0) {
                    currentCol--;
                    const cell = document.getElementById(`cell-${currentRow}-${currentCol}`);
                    cell.textContent = "";
                }
                return;
            }

            if (key === "ENTER") {
                if (currentCol === wordLength) {
                    checkWord();
                } else {
                    showMessage("Заполните все пустые клетки");
                }
                return;
            }

            if (currentCol < wordLength) {
                const cell = document.getElementById(`cell-${currentRow}-${currentCol}`);
                cell.textContent = key;
                currentCol++;
            }
        }

        function showMessage(msg) {
            document.getElementById("message").textContent = msg;
            if (msg !== "") {
                setTimeout(() => {
                    if (!gameOver) document.getElementById("message").textContent = "";
                }, 2000);
            }
        }

        function checkWord() {
            isAnimating = true;

            let guess = "";
            for (let c = 0; c < wordLength; c++) {
                guess += document.getElementById(`cell-${currentRow}-${c}`).textContent;
            }

            let targetLetters = targetWord.split("");
            let guessLetters = guess.split("");
            let colors = new Array(wordLength).fill("absent");

            for (let i = 0; i < wordLength; i++) {
                if (guessLetters[i] === targetLetters[i]) {
                    colors[i] = "correct";
                    targetLetters[i] = null;
                }
            }

            for (let i = 0; i < wordLength; i++) {
                if (colors[i] === "correct") continue;
                let index = targetLetters.indexOf(guessLetters[i]);
                if (index !== -1) {
                    colors[i] = "present";
                    targetLetters[index] = null;
                }
            }

            for (let i = 0; i < wordLength; i++) {
                setTimeout(() => {
                    const cell = document.getElementById(`cell-${currentRow}-${i}`);
                    cell.classList.add(colors[i]);
                    updateKeyboardColor(guessLetters[i], colors[i]);
                }, i * 200);
            }

            setTimeout(() => {
                isAnimating = false;

                if (guess === targetWord) {
                    showMessage("Великолепно! 🎉");
                    playEndSound();
                    gameOver = true;
                    return;
                }

                currentRow++;
                currentCol = 0;

                if (currentRow === maxGuesses) {
                    showMessage(`Игра окончена! Было слово: ${targetWord.toUpperCase()}`);
                    playEndSound();
                    gameOver = true;
                }
            }, wordLength * 200 + 100);
        }

        function updateKeyboardColor(letter, colorClass) {
            const keyEl = document.getElementById(`key-${letter}`);
            if (!keyEl) return;

            if (keyEl.classList.contains("correct")) return;
            if (keyEl.classList.contains("present") && colorClass === "absent") return;

            keyEl.classList.remove("present", "absent", "correct");
            keyEl.classList.add(colorClass);
        }
    </script>

    <style>
        .music-context-menu {
            position: fixed;
            z-index: 30;
            width: min(320px, 92vw);
            background: rgba(210, 241, 255, 0.92);
            border: 1px solid rgba(255, 255, 255, 0.95);
            border-radius: 14px;
            box-shadow: 0 10px 28px rgba(0, 106, 176, 0.35);
            backdrop-filter: blur(8px);
            padding: 12px;
            display: none;
        }

        .music-context-menu.open { display: block; }
        .music-context-menu h4 { margin: 0 0 8px; color: #005d8f; }
        .music-context-menu input[type="url"] {
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 8px;
            padding: 8px 10px;
            border-radius: 10px;
            border: 1px solid #76cfff;
            font-family: inherit;
        }

        .music-context-menu label {
            display: flex;
            gap: 8px;
            margin-bottom: 6px;
            font-size: 0.9rem;
            color: #014f7a;
            align-items: center;
        }

        .music-context-actions {
            display: grid;
            grid-template-columns: 1fr;
            gap: 6px;
            margin-top: 8px;
        }
    </style>

    <script>
        (function enhanceInteractions() {
            const BUBBLE_SOUND_URL = "https://www.dropbox.com/scl/fi/8cyp8dx5kwiqq2bq8lemk/zvuk-puzyr-ynhg9.mp3?rlkey=lvnn1ehpzjk52xc2rg90xqprg&st=e1y7jkmf&dl=1";
            const END_SOUND_URL = "https://www.dropbox.com/scl/fi/24n870y6mqoxlnlzszdos/zvuk-puzyr-tup.mp3?rlkey=hk5hk4e0iaq4x2bcx39ju9gox&st=jrcedp0w&dl=1";

            const bubbleAudio = document.getElementById("sound-bubble");
            const endAudio = document.getElementById("sound-end");
            bubbleAudio.src = BUBBLE_SOUND_URL;
            endAudio.src = END_SOUND_URL;

            window.playBubble = function playBubbleOverride() {
                bubbleAudio.currentTime = 0;
                bubbleAudio.play().catch(() => {});
            };

            window.playEndSound = function playEndSoundOverride() {
                endAudio.currentTime = 0;
                endAudio.play().catch(() => {});
            };

            function makeDraggable(el, handleCheck) {
                let dragging = false;
                let moved = false;
                let startX = 0;
                let startY = 0;
                let offsetX = 0;
                let offsetY = 0;

                const onMove = (event) => {
                    if (!dragging) return;
                    const clientX = event.touches ? event.touches[0].clientX : event.clientX;
                    const clientY = event.touches ? event.touches[0].clientY : event.clientY;
                    const nextX = clientX - offsetX;
                    const nextY = clientY - offsetY;

                    const maxX = window.innerWidth - el.offsetWidth;
                    const maxY = window.innerHeight - el.offsetHeight;
                    el.style.left = `${Math.min(Math.max(0, nextX), Math.max(0, maxX))}px`;
                    el.style.top = `${Math.min(Math.max(0, nextY), Math.max(0, maxY))}px`;
                    moved = moved || Math.abs(clientX - startX) > 4 || Math.abs(clientY - startY) > 4;
                };

                const onUp = () => {
                    if (!dragging) return;
                    dragging = false;
                    document.removeEventListener("mousemove", onMove);
                    document.removeEventListener("mouseup", onUp);
                    document.removeEventListener("touchmove", onMove);
                    document.removeEventListener("touchend", onUp);
                    if (moved) setTimeout(() => { moved = false; }, 50);
                };

                const onDown = (event) => {
                    const isTouch = event.type.startsWith("touch");
                    const target = event.target;
                    if (!handleCheck(target, event)) return;

                    const clientX = isTouch ? event.touches[0].clientX : event.clientX;
                    const clientY = isTouch ? event.touches[0].clientY : event.clientY;
                    const rect = el.getBoundingClientRect();
                    el.style.position = "fixed";
                    el.style.left = `${rect.left}px`;
                    el.style.top = `${rect.top}px`;
                    el.style.margin = "0";
                    el.style.zIndex = "12";

                    startX = clientX;
                    startY = clientY;
                    offsetX = clientX - rect.left;
                    offsetY = clientY - rect.top;
                    dragging = true;
                    moved = false;

                    document.addEventListener("mousemove", onMove);
                    document.addEventListener("mouseup", onUp);
                    document.addEventListener("touchmove", onMove, { passive: false });
                    document.addEventListener("touchend", onUp);
                };

                el.addEventListener("mousedown", onDown);
                el.addEventListener("touchstart", onDown, { passive: true });
                el.addEventListener("click", (event) => {
                    if (moved) {
                        event.preventDefault();
                        event.stopPropagation();
                    }
                }, true);
            }

            document.querySelectorAll(".bubble-btn").forEach((bubbleBtn) => {
                makeDraggable(bubbleBtn, () => true);
            });

            const mainContainer = document.getElementById("main-container");
            makeDraggable(mainContainer, (target, event) => {
                if (target.closest("button, input, #keyboard, #game-board, #friend-menu, #wallpaper-modal")) return false;
                const rect = mainContainer.getBoundingClientRect();
                const clientY = event.touches ? event.touches[0].clientY : event.clientY;
                return clientY - rect.top <= 70;
            });

            const musicBubble = Array.from(document.querySelectorAll(".bubble-btn")).find((btn) =>
                String(btn.getAttribute("onclick") || "").includes("nextMusicTrack")
            );
            if (!musicBubble) return;

            const defaultTracks = Array.isArray(musicPlaylist) ? [...musicPlaylist] : [];
            let customExclusiveTrack = null;
            let customLoop = false;
            const oldNextTrack = window.nextMusicTrack;

            window.nextMusicTrack = function patchedNextMusic(forcePlay = true) {
                if (customExclusiveTrack) {
                    bgMusic.loop = customLoop;
                    bgMusic.src = customExclusiveTrack;
                    if (forcePlay) bgMusic.play().catch(() => {});
                    playBubble();
                    return;
                }
                bgMusic.loop = false;
                oldNextTrack(forcePlay);
            };

            const menu = document.createElement("div");
            menu.className = "music-context-menu";
            menu.innerHTML = `
                <h4>Музыка пузыря</h4>
                <input id="music-url-input" type="url" placeholder="Вставь ссылку на трек" />
                <label><input id="music-apply-now" type="checkbox" /> Отключить текущие и поставить этот</label>
                <label><input id="music-loop-track" type="checkbox" /> Зациклить этот трек</label>
                <div class="music-context-actions">
                    <button id="music-add-btn" class="action-btn" type="button">Добавить/Применить</button>
                    <button id="music-reset-btn" class="action-btn" type="button">Удалить этот и вернуть music.js</button>
                </div>
            `;
            document.body.appendChild(menu);

            const urlInput = menu.querySelector("#music-url-input");
            const applyNowCheck = menu.querySelector("#music-apply-now");
            const loopCheck = menu.querySelector("#music-loop-track");
            const addBtn = menu.querySelector("#music-add-btn");
            const resetBtn = menu.querySelector("#music-reset-btn");

            musicBubble.addEventListener("contextmenu", (event) => {
                event.preventDefault();
                playBubble();
                menu.style.left = `${Math.min(event.clientX, window.innerWidth - menu.offsetWidth - 12)}px`;
                menu.style.top = `${Math.min(event.clientY, window.innerHeight - 220)}px`;
                menu.classList.toggle("open");
            });

            document.addEventListener("click", (event) => {
                if (!menu.contains(event.target) && event.target !== musicBubble) {
                    menu.classList.remove("open");
                }
            });

            addBtn.addEventListener("click", () => {
                const url = (urlInput.value || "").trim();
                if (!url) return;
                addMusicTrack(url);
                if (applyNowCheck.checked) {
                    customExclusiveTrack = url;
                    customLoop = loopCheck.checked;
                    bgMusic.loop = customLoop;
                    bgMusic.src = customExclusiveTrack;
                    bgMusic.play().catch(() => {});
                }
                menu.classList.remove("open");
                playBubble();
            });

            resetBtn.addEventListener("click", () => {
                customExclusiveTrack = null;
                customLoop = false;
                bgMusic.loop = false;
                musicPlaylist.splice(0, musicPlaylist.length, ...defaultTracks);
                if (musicPlaylist.length > 0) {
                    loadTrack(0);
                    bgMusic.play().catch(() => {});
                }
                urlInput.value = "";
                applyNowCheck.checked = false;
                loopCheck.checked = false;
                menu.classList.remove("open");
                playBubble();
            });
        })();
    </script>
</body>
</html>
